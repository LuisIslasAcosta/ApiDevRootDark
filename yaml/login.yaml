tags:
  - Users
description: Endpoint_para_iniciar_sesión_de_un_usuario
parameters:
  - name: body
    in: body
    schema:
      type: object
      properties:
        email:
          type: string
        password:
          type: string
      required:
        - email
        - password
responses:
  200:
    description: Inicio de sesión exitoso
    schema:
      type: object
      properties:
        access_token:
          type: string
        usuario:
          type: object
  401:
    description: Credenciales inválidas